<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>KS Facture</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme color (browser chrome + status bar) -->
    <meta name="theme-color" content="#2563EB" />

    <!-- iOS / Safari PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="KS Facture" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Description for install prompt -->
    <meta name="description" content="Application de facturation pour auto-entrepreneurs marocains" />

    <!-- Prevent content from hiding behind notch/safe areas -->
    <style>
      body { padding-top: env(safe-area-inset-top); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .catch(() => {}) // Fail silently — app still works without SW
        })
      }
    </script>
  </body>
</html>
